<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Frame Admin</title>
  <style>
    :root { --ink:#191815; --paper:#f3efe4; --accent:#d95732; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; padding:30px 20px; background:var(--paper); color:var(--ink); font-family:Georgia,"Times New Roman",serif; }
    main { width:min(760px,100%); margin:auto; }
    .eyebrow { margin:0 0 10px; color:var(--accent); font:700 .72rem Arial,sans-serif; letter-spacing:.18em; text-transform:uppercase; }
    h1 { margin:0 0 30px; font-size:clamp(2.7rem,9vw,6rem); line-height:.85; letter-spacing:-.06em; }
    .panel { display:grid; grid-template-columns:minmax(0,1fr) 250px; border-top:5px solid var(--ink); padding-top:20px; gap:24px; }
    img { display:block; width:100%; aspect-ratio:758/1024; object-fit:contain; background:#fff; border:1px solid var(--ink); }
    label { display:block; margin-bottom:7px; font:700 .72rem Arial,sans-serif; letter-spacing:.09em; text-transform:uppercase; }
    input { width:100%; padding:12px; border:1px solid var(--ink); border-radius:0; background:#fff; font:1rem Arial,sans-serif; }
    button { width:100%; margin-top:14px; padding:14px; border:1px solid var(--accent); background:var(--accent); color:#fff; font:700 1rem Arial,sans-serif; cursor:pointer; }
    button:disabled { opacity:.5; cursor:wait; }
    h2 { margin:0 0 5px; font-size:2rem; }
    #location { margin:0 0 18px; font-style:italic; }
    #votes { font:700 .8rem Arial,sans-serif; letter-spacing:.1em; text-transform:uppercase; }
    #status { min-height:3em; font:.9rem/1.45 Arial,sans-serif; }
    a { color:inherit; }
    @media(max-width:650px) { .panel { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">PocketBook Frame control room</p>
    <h1>Publish the<br>leader now.</h1>
    <section class="panel">
      <img id="preview" alt="Current leading drawing">
      <div>
        <p class="eyebrow">Current leader</p>
        <h2 id="artist">Loading…</h2>
        <p id="location"></p>
        <p id="votes"></p>
        <label for="secret">Admin secret</label>
        <input id="secret" type="password" autocomplete="current-password">
        <button id="publish" type="button" disabled>Publish and close round</button>
        <p id="status" role="status"></p>
        <a href="/">Return to the contest</a>
      </div>
    </section>
  </main>
  <script>
    const preview=document.querySelector('#preview');
    const publish=document.querySelector('#publish');
    const secret=document.querySelector('#secret');
    const status=document.querySelector('#status');
    let leader=null;

    async function loadLeader() {
      try {
        const {submissions}=await (await fetch('/api/submissions')).json();
        leader=submissions[0]||null;
        if(!leader){document.querySelector('#artist').textContent='No active entries';preview.removeAttribute('src');publish.disabled=true;return;}
        document.querySelector('#artist').textContent=leader.artist;
        document.querySelector('#location').textContent=leader.location||'Location not shared';
        document.querySelector('#votes').textContent=`${leader.votes} vote${leader.votes===1?'':'s'}`;
        preview.src=`/api/submissions/${leader.id}/image`;
        publish.disabled=false;
      } catch(error) { status.textContent=error.message; }
    }

    publish.addEventListener('click',async()=>{
      if(!secret.value){status.textContent='Enter the admin secret.';secret.focus();return;}
      if(!confirm(`Publish ${leader.artist}'s drawing and close the current round?`))return;
      publish.disabled=true;status.textContent='Publishing…';
      try {
        const response=await fetch('/api/admin/publish',{method:'POST',headers:{Authorization:`Bearer ${secret.value}`}});
        if(response.status===401)throw new Error('Incorrect admin secret.');
        const result=await response.json();
        if(!response.ok)throw new Error(`Server error (${response.status}).`);
        status.textContent=result.published?`${result.artist}'s drawing is now live on the frame.`:'There are no entries to publish.';
        if(result.published)await loadLeader();
      } catch(error) { status.textContent=error.message;publish.disabled=!leader; }
    });
    loadLeader();
  </script>
</body>
</html>
