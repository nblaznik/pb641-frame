<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PocketBook Frame</title>
  <style>
    :root { color-scheme: light; --ink:#191815; --paper:#f3efe4; --accent:#d95732; --line:#cbc3b3; --white:#fff; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--paper); color:var(--ink); font-family:Georgia,"Times New Roman",serif; }
    button,input { font:inherit; }
    .masthead { width:min(1180px,100%); margin:auto; padding:28px 20px 22px; border-bottom:1px solid var(--ink); }
    h1 { margin:0; font-size:clamp(2.4rem,7vw,5.6rem); line-height:.82; letter-spacing:-.06em; }
    .eyebrow { margin:0 0 10px; font:700 .7rem/1.2 Arial,sans-serif; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); }
    label { display:block; margin:15px 0 6px; font:700 .7rem/1.2 Arial,sans-serif; letter-spacing:.09em; text-transform:uppercase; }
    input[type="text"],input[type="password"] { width:100%; padding:11px; border:1px solid var(--ink); border-radius:0; background:var(--white); font-family:Arial,sans-serif; }
    .tabs { display:flex; gap:8px; width:min(1180px,100%); margin:18px auto 0; padding:0 20px; }
    button { border:1px solid var(--ink); padding:11px 15px; background:transparent; color:var(--ink); font-family:Arial,sans-serif; font-weight:700; cursor:pointer; }
    button.active { background:var(--ink); color:var(--paper); }
    button.primary { border-color:var(--accent); background:var(--accent); color:#fff; }
    button:disabled { opacity:.5; cursor:wait; }
    .view { display:none; }
    .view.active { display:block; }
    .draw-layout { width:min(1180px,100%); margin:auto; padding:24px 20px 50px; display:grid; grid-template-columns:minmax(0,758px) 290px; gap:30px; align-items:start; }
    .canvas-shell { background:#fff; border:1px solid var(--ink); box-shadow:10px 10px 0 var(--ink); touch-action:none; }
    canvas { display:block; width:100%; height:auto; cursor:crosshair; }
    aside { position:sticky; top:20px; border-top:5px solid var(--ink); padding-top:5px; }
    input[type="range"] { width:100%; accent-color:var(--accent); }
    .tools { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:18px; }
    .submit { width:100%; margin-top:24px; padding:15px; }
    .status { min-height:2.8em; margin:12px 0 0; font:.86rem/1.4 Arial,sans-serif; }
    .note { margin-top:22px; padding-top:12px; border-top:1px solid var(--line); font-size:.88rem; line-height:1.5; }
    .gallery-wrap { width:min(1180px,100%); margin:auto; padding:28px 20px 60px; }
    .gallery-head { display:flex; align-items:end; justify-content:space-between; gap:20px; margin-bottom:24px; }
    h2 { margin:0; font-size:clamp(2rem,5vw,4rem); letter-spacing:-.04em; }
    .gallery { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:22px; }
    .entry { background:#fff; border:1px solid var(--ink); }
    .entry img { display:block; width:100%; aspect-ratio:758/1024; object-fit:contain; background:#fff; border-bottom:1px solid var(--ink); }
    .entry-info { padding:14px; }
    .entry h3 { margin:0; font-size:1.25rem; }
    .location { margin:4px 0 14px; color:#645e53; font-style:italic; }
    .vote-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .votes { font:700 .8rem Arial,sans-serif; text-transform:uppercase; letter-spacing:.08em; }
    .empty { padding:50px 0; border-top:1px solid var(--ink); font-size:1.2rem; }
    @media(max-width:780px) {
      .draw-layout { grid-template-columns:1fr; }
      aside { position:static; }
      .canvas-shell { box-shadow:6px 6px 0 var(--ink); }
      .gallery { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:520px) { .gallery { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="masthead"><p class="eyebrow">An open twice-daily drawing contest for E-Ink</p><h1>Draw for<br>the frame.</h1></header>

  <nav class="tabs" aria-label="Choose an activity">
    <button id="draw-tab" class="active" type="button">Submit a drawing</button>
    <button id="vote-tab" type="button">Vote on drawings</button>
  </nav>

  <section id="draw-view" class="view active">
    <div class="draw-layout">
      <div class="canvas-shell"><canvas id="drawing" width="758" height="900"></canvas></div>
      <aside>
        <label for="artist">Your name</label><input id="artist" type="text" maxlength="80" placeholder="Required">
        <label for="location">Your location</label><input id="location" type="text" maxlength="120" placeholder="Optional, e.g. Ljubljana">
        <label for="width">Stroke width</label><input id="width" type="range" min="2" max="40" value="9">
        <div class="tools">
          <button id="pen" class="active" type="button">Pen</button><button id="eraser" type="button">Eraser</button>
          <button id="clear" type="button">Clear</button><button id="undo" type="button">Undo</button>
        </div>
        <button id="submit" class="primary submit" type="button">Enter this drawing</button>
        <p id="draw-status" class="status" role="status"></p>
        <p class="note">Voting rounds close at 09:00 and 18:00 Europe/Ljubljana time. The winner is sent to the PocketBook with your name and optional location in the footer.</p>
      </aside>
    </div>
  </section>

  <section id="vote-view" class="view">
    <div class="gallery-wrap">
      <div class="gallery-head"><div><p class="eyebrow">Current round</p><h2>Choose a favorite.</h2></div><button id="refresh" type="button">Refresh</button></div>
      <p id="vote-status" class="status" role="status"></p>
      <div id="gallery" class="gallery"></div>
    </div>
  </section>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const canvas = $('#drawing');
    const context = canvas.getContext('2d', { alpha: false });
    const artist = $('#artist');
    const locationInput = $('#location');
    const width = $('#width');
    const history = [];
    let drawing = false;
    let erasing = false;
    let imageUrls = [];

    context.fillStyle = '#fff';
    context.fillRect(0, 0, canvas.width, canvas.height);
    context.lineCap = 'round';
    context.lineJoin = 'round';

    function point(event) {
      const rect = canvas.getBoundingClientRect();
      return { x:(event.clientX-rect.left)*canvas.width/rect.width, y:(event.clientY-rect.top)*canvas.height/rect.height };
    }
    function remember() {
      history.push(context.getImageData(0,0,canvas.width,canvas.height));
      if (history.length>10) history.shift();
    }
    canvas.addEventListener('pointerdown',(event)=>{
      remember(); drawing=true; canvas.setPointerCapture(event.pointerId);
      const start=point(event); context.beginPath(); context.moveTo(start.x,start.y);
    });
    canvas.addEventListener('pointermove',(event)=>{
      if(!drawing)return; const next=point(event);
      context.strokeStyle=erasing?'#fff':'#111'; context.lineWidth=Number(width.value);
      context.lineTo(next.x,next.y); context.stroke();
    });
    canvas.addEventListener('pointerup',()=>{drawing=false;});
    canvas.addEventListener('pointercancel',()=>{drawing=false;});

    function setTool(useEraser) {
      erasing=useEraser; $('#pen').classList.toggle('active',!useEraser); $('#eraser').classList.toggle('active',useEraser);
    }
    $('#pen').addEventListener('click',()=>setTool(false));
    $('#eraser').addEventListener('click',()=>setTool(true));
    $('#clear').addEventListener('click',()=>{remember();context.fillStyle='#fff';context.fillRect(0,0,canvas.width,canvas.height);});
    $('#undo').addEventListener('click',()=>{const previous=history.pop();if(previous)context.putImageData(previous,0,0);});

    function switchView(vote) {
      $('#draw-view').classList.toggle('active',!vote); $('#vote-view').classList.toggle('active',vote);
      $('#draw-tab').classList.toggle('active',!vote); $('#vote-tab').classList.toggle('active',vote);
      if(vote)loadGallery();
    }
    $('#draw-tab').addEventListener('click',()=>switchView(false));
    $('#vote-tab').addEventListener('click',()=>switchView(true));
    $('#refresh').addEventListener('click',loadGallery);

    function exportedDrawing() {
      const output=document.createElement('canvas'); output.width=758; output.height=1024;
      const out=output.getContext('2d',{alpha:false}); out.fillStyle='#fff'; out.fillRect(0,0,758,1024);
      out.drawImage(canvas,0,0); out.strokeStyle='#222'; out.lineWidth=2; out.beginPath(); out.moveTo(34,930); out.lineTo(724,930); out.stroke();
      out.fillStyle='#111'; out.font='bold 28px Georgia'; out.textAlign='center';
      out.fillText(`Drawn by ${artist.value.trim()}`,379,972,690);
      if(locationInput.value.trim()){out.font='20px Georgia';out.fillText(locationInput.value.trim(),379,1003,690);}
      return new Promise((resolve)=>output.toBlob(resolve,'image/jpeg',.92));
    }

    $('#submit').addEventListener('click',async()=>{
      const status=$('#draw-status');
      if(!artist.value.trim()){status.textContent='Enter your name.';artist.focus();return;}
      $('#submit').disabled=true; status.textContent='Submitting your drawing…';
      try {
        const image=await exportedDrawing(); const form=new FormData();
        form.append('image',image,'drawing.jpg'); form.append('artist',artist.value.trim()); form.append('location',locationInput.value.trim());
        const response=await fetch('/api/submissions',{method:'POST',body:form});
        const result=await response.json(); if(!response.ok)throw new Error(result.error||`Server error (${response.status}).`);
        status.textContent='Entered. Open the voting gallery to see your drawing.';
      } catch(error) { status.textContent=error.message; }
      finally { $('#submit').disabled=false; }
    });

    function voterId() {
      let id=localStorage.getItem('frameVoterId');
      if(!id){id=crypto.randomUUID();localStorage.setItem('frameVoterId',id);} return id;
    }
    async function loadGallery() {
      const gallery=$('#gallery'); const status=$('#vote-status');
      status.textContent='Loading entries…'; imageUrls.forEach(URL.revokeObjectURL); imageUrls=[];
      try {
        const response=await fetch('/api/submissions');
        if(!response.ok)throw new Error(`Server error (${response.status}).`);
        const {submissions}=await response.json(); gallery.replaceChildren();
        if(!submissions.length){gallery.innerHTML='<p class="empty">No drawings yet. Be the first to enter this round.</p>';status.textContent='';return;}
        await Promise.all(submissions.map(async(entry)=>{
          const imageResponse=await fetch(`/api/submissions/${entry.id}/image`);
          const imageUrl=URL.createObjectURL(await imageResponse.blob()); imageUrls.push(imageUrl);
          const card=document.createElement('article'); card.className='entry';
          const image=document.createElement('img'); image.src=imageUrl; image.alt=`Drawing by ${entry.artist}`;
          const info=document.createElement('div'); info.className='entry-info';
          const name=document.createElement('h3'); name.textContent=entry.artist;
          const place=document.createElement('p'); place.className='location'; place.textContent=entry.location||'Location not shared';
          const row=document.createElement('div'); row.className='vote-row';
          const count=document.createElement('span'); count.className='votes'; count.textContent=`${entry.votes} vote${entry.votes===1?'':'s'}`;
          const button=document.createElement('button'); button.type='button'; button.textContent='Vote';
          button.addEventListener('click',async()=>{
            button.disabled=true;
            try{const vote=await fetch(`/api/submissions/${entry.id}/vote`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voterId:voterId()})});const result=await vote.json();if(!vote.ok)throw new Error(result.error);count.textContent=`${result.votes} vote${result.votes===1?'':'s'}`;button.textContent=result.accepted?'Voted':'Already voted';}
            catch(error){status.textContent=error.message;button.disabled=false;}
          });
          row.append(count,button); info.append(name,place,row); card.append(image,info); gallery.append(card);
        }));
        status.textContent='Vote once for as many drawings as you like.';
      } catch(error){status.textContent=error.message;gallery.replaceChildren();}
    }
  </script>
</body>
</html>
